<style>
    :root{--bg:#090a0c;--card:#111318;--gold:#c7a44a;--text:#e9ebf0;--muted:#a7adba;}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);
      background:radial-gradient(1000px 700px at 50% -10%, rgba(199,164,74,.18), transparent 60%), var(--bg);}
    header{position:sticky;top:0;background:rgba(9,10,12,.75);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.06);z-index:10}
    .wrap{max-width:1120px;margin:0 auto;padding:18px 18px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;letter-spacing:.08em}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 16px rgba(199,164,74,.6)}
    nav a{color:var(--muted);text-decoration:none;margin-left:14px;font-size:14px}
    nav a:hover{color:var(--text)}
    h1{margin:18px 0 6px;font-size:34px;letter-spacing:.02em}
    p{margin:0;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
    @media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:720px){.grid{grid-template-columns:1fr}}
    .card{background:rgba(17,19,24,.7);border:1px solid rgba(255,255,255,.08);border-radius:16px;overflow:hidden}
    .card img{width:100%;height:260px;object-fit:cover;display:block}
    .pad{padding:14px 14px 16px}
    .t{font-weight:800;letter-spacing:.04em;margin:0 0 6px}
    .btn{display:inline-block;margin-top:10px;padding:10px 14px;border-radius:12px;background:rgba(199,164,74,.12);
      border:1px solid rgba(199,164,74,.4);color:var(--text);text-decoration:none;font-weight:700;font-size:14px}
    .btn:hover{background:rgba(199,164,74,.18)}

.list{margin-top:18px;display:grid;gap:12px}
.item{padding:14px;border-radius:16px;background:rgba(17,19,24,.7);border:1px solid rgba(255,255,255,.08)}
.item b{letter-spacing:.03em}

/* SUPER PREMIUM MOBILE TUNING */
@media (max-width: 720px){
  .hero{min-height: 88vh; padding-top: 84px;}
  .hero::before{opacity:.55;}
  .hero .inner{padding: 0 18px;}
  .hero h1{font-size: clamp(28px, 8vw, 44px); letter-spacing:.06em;}
  .hero .sub{max-width: 34ch; font-size: 14px; line-height: 1.55; opacity:.95;}
  .hero .cta{flex-direction: column; gap: 10px; width: 100%;}
  .hero .cta .btn{width: 100%; justify-content:center; padding: 14px 16px; border-radius: 16px;}
  header .right{gap: 8px;}
  header .icon{width: 42px; height: 42px; border-radius: 14px;}
  .lang-switch{gap: 8px;}
  .lang-switch button{min-width: 40px; height: 32px; border-radius: 12px;}
  .cards{grid-template-columns: 1fr; gap: 14px;}
  .card{border-radius: 22px;}
  .card .img{aspect-ratio: 16/10;}
  .section{padding: 44px 0;}
  .footer .cols{grid-template-columns: 1fr; gap: 16px;}
}
@media (max-width: 420px){
  .hero{min-height: 86vh;}
  .hero h1{font-size: 30px;}
  .topline{font-size: 12px; letter-spacing:.22em;}
}
@media (prefers-reduced-motion: reduce){
  *{scroll-behavior:auto!important;}
}

</style>
